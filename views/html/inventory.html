        text-decoration: none;
      }
      ul li {
        border: 1px solid rgb(44, 41, 41);
        border-radius: 5px;
        padding: 15px;

      li a {
        list-style-type: none;
        font-size: 1.5rem;
        color: white;
        text-decoration: none;

      li:hover {

      input {

        height: 2rem;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 1rem;
        margin: 0 300px 0 30px;
        border: none;
      }
      button {

        height: 2.5rem;

          <input type="search" placeholder="Search inventory" />
