<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Nyondo</title>

  <link rel="stylesheet" href="/css/login.css"/>
</head>

<body>

  <div class="card">

    <img src="/images/logo.png" class="logo" width="55" height="55" alt="logo"/>

    <h2>Create Account</h2>
    <p class="sub">Register to access Nyondo Stock System</p>

    <form action="/register" method="POST">

      <div class="grid">

        <!-- FULL NAME -->
        <div class="field">
          <label>Full Name</label>
          <input type="text" name="fullname" placeholder="Enter full name" required>
        </div>

        <!-- EMAIL -->
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <!-- PHONE -->
        <div class="field">
          <label>Phone Number</label>
          <input type="number" name="phone" placeholder="Enter phone number" required>
        </div>

        <!-- NIN -->
        <div class="field">
          <label>NIN</label>
          <input type="text" name="nin" placeholder="Enter NIN" required>
        </div>

        <!-- ROLE -->
        <div class="field full">
          <label>Role</label>
          <select name="role" required>
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
            <option value="storemanager">Store Manager</option>
            <option value="salesattendant">Sales Attendant</option>
          </select>
        </div>

        <!-- PASSWORD -->
        <div class="field full">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required>
        </div>

      </div>

      <button type="submit">Create Account</button>

      <div class="login-link">
        Already have an account? <a href="/login">Login</a>
      </div>

    </form>

  </div>

</body>
</html>
