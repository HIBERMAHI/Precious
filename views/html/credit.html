<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Credit & Debit Sales</title>

  <link rel="stylesheet" href="/css/credit.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

  <div class="logo">
    <h2>⚒ NYONDO HARDWARE</h2>
    <p>Point of Sale System</p>
  </div>

  <ul>
    <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
    <li><a href="NewSales.html"><i class="fas fa-cart-shopping"></i> New Sales</a></li>
    <li><a href="stockview.html"><i class="fas fa-boxes"></i> Stock View</a></li>
    <li class="active"><a href="credit.html"><i class="fas fa-credit-card"></i> Credit Sales</a></li>
    <li><a href="saleshistory.html"><i class="fas fa-clock-rotate-left"></i> Sales History</a></li>
    <li><a href="#"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
  </ul>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h2><i class="fas fa-credit-card"></i> Credit & Debit Sales</h2>
    <p>Manage customer credit and record payments</p>
  </div>

  <!-- CONTENT -->
  <div class="grid">

    <!-- CREDIT -->
    <div class="card">
      <h3><i class="fas fa-hand-holding-dollar"></i> Credit Sale</h3>

      <form action="/credit" method="post">
        <label>Customer Name</label>
        <input type="text" name="customername">

        <label>Item</label>
        <input type="text" name="item">

        <label>Amount Owed</label>
        <input type="number" name="amountowed">

        <label>Due Date</label>
        <input type="date" name="duedate">

        <button class="btn-primary">
          <i class="fas fa-plus"></i> Save Credit
        </button>
      </form>
    </div>

    <!-- DEBIT -->
    <div class="card">
      <h3><i class="fas fa-money-bill"></i> Debit Payment</h3>

      <form action="/debit" method="post">
        <label>Customer Name</label>
        <input type="text" name="customername">

        <label>Item</label>
        <input type="text" name="item">

        <label>Amount Paid</label>
        <input type="number" name="amountpaid">

        <label>Payment Method</label>
        <select name="paymentmethod">
          <option>Cash</option>
          <option>Mobile Money</option>
          <option>Bank</option>
        </select>

        <button class="btn-secondary">
          <i class="fas fa-check"></i> Save Payment
        </button>
      </form>
    </div>

  </div>

</div>

</body>
</html>
