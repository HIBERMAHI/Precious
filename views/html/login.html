<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css/precious.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        height: auto;
        background: linear-gradient(to right, #010b1b, #011126);
      }
      label {
        text-align: left;
        margin: 10px 0px;
        font-size: 1.2rem;
        color: rgb(9, 9, 53);
      }
      input {
        height: 3rem;
        border-radius: 8px;
      }
      a {
        text-decoration: none;
        margin-left: 10px;
        font-size: 1.2rem;
        color: rgb(9, 9, 52);
      }
      button {
        width: 100%;
        height: 3rem;
        color: rgb(214, 208, 208);
        background-color: rgb(15, 15, 83);
        font-size: 1.5rem;
        border: none;
        border-radius: 12px;
      }
    </style>
  </head>
  <body class="login-page">
    <div class="card">
      <img
        class="logo"
        src="/images/logo.png"
        width="50"
        height="50"
        alt="logo"
      />
      <h4>Singn In to get started</h4>
      <p class="para">Sign up to get started</p>
      <form>
        <div class="part1">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter Your Email"
            required
          />
        </div>
        <div class="part1">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Enter Password"
            required
          />
        </div>
        <div class="check">
          <div class="remember">
            <input id="checkbox" type="checkbox" />
            <label for="checkbox">Remember me</label>
          </div>
          <a href="#">Forgot Password</a>
        </div>
        <button type="submit">Login</button>
        <div class="login">Don't have an account? <a href="#">Sign Up</a></div>
      </form>
    </div>
  </body>
</html>
