<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css/precious.css" />
    <style>
       body {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        height: auto;
        background: linear-gradient(to right, #020e20, #020b15);
      }
      label {
        text-align: left;
        margin: 10px 0px;
        font-size: 1.2rem;
        color: rgb(9, 9, 53);
      }
      input {
        height: 3rem;
        border-radius: 8px;
        /* border: none; */
      }
      a{
        text-decoration: none;
        margin-left: 10px;
        font-size: 1.2rem;
        color: rgb(9, 9, 52);
      }
      button{
    width: 100%;
    height: 3rem;
    color: rgb(214, 208, 208);
    background-color: rgb(15, 15, 83);
    font-size:1.5rem ;
    border: none;
    border-radius: 12px;
}
button.regi{
margin: 5px 0;
}

    </style>
  </head>
  <body class="register-page" >
    <div class="card34" >
      <img src="/images/logo.png" width="50" height="50" alt="logo" />
      <h4>CREATE AN ACCOUNT</h4>
      <p>Create your account to get started</p>
      <form action="register"  method="post">
        <div class="part1" >
          <label for="fname">Full Name</label>
          <input
            type="text"
            name="fullname"
            id="fname"
            placeholder="Enter Full Name"
            required
          />
        </div>
        <div class="part1" >
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter Your Email"
            required
          />
        </div>
        <div  class="part1">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Enter Your Password"
            required
          />
        </div>
        <div class="part1"  >
          <label for="cpassword">Confirm Password</label>
          <input
            type="password"
            name="confirmpassword"
            id="cpassword"
            placeholder="Re-Enter Password"
            required
          />
        </div>
        <button class="regi" type="submit" >Register Account</button>
        <div class="login" >Already have an account <a href="#" >Sign In</a> </div>
      </form>
    </div>
  </body>
</html>
